name: "Setup Python + pip cache"
description: "Setup Python and cache pip dependencies."
inputs:
  python_version:
    description: "Python version."
    required: false
    default: "3.11"
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}
        cache: pip
