name: Reusable - Integration Smoke Test

on:
  workflow_call:
    inputs:
      image-name:
        description: "Backend image name."
        required: true
        type: string
      image-tag:
        description: "Backend image tag."
        required: true
        type: string

jobs:
  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Docker image
        run: docker load < backend-image.tar

      - name: Setup PostgreSQL service
        run: |
          docker network create servicehub-network
          docker run -d \
            --network servicehub-network \
            --name postgres \
            -e POSTGRES_DB=servicehub \
            -e POSTGRES_USER=servicehub \
            -e POSTGRES_PASSWORD=${{ secrets.SERVICEHUB_DB_PASSWORD }} \
            -p 5432:5432 \
            postgres:16-alpine
          sleep 5

      - name: Run backend container
        run: |
          docker run -d \
            --network servicehub-network \
            --name backend-integration \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/servicehub \
            -e SPRING_DATASOURCE_USERNAME=servicehub \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SERVICEHUB_DB_PASSWORD }} \
            -e JWT_SECRET=${{ secrets.SERVICEHUB_JWT_SECRET }} \
            "${{ inputs.image-name }}:${{ inputs.image-tag }}"

      - name: Smoke test /actuator/health
        uses: ./.github/actions/log-group
        with:
          title: "Integration smoke /actuator/health"

      - name: Wait and call health endpoint
        run: |
          echo "Waiting 20 seconds for Spring Boot to start..."
          sleep 20
          curl -f http://localhost:8080/actuator/health

      - name: End integration smoke group
        if: always()
        uses: ./.github/actions/log-group
        with:
          title: "Integration smoke /actuator/health"
          end: "true"
