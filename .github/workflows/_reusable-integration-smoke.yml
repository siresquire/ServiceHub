name: Reusable - Integration Smoke Test

on:
  workflow_call:
    inputs:
      image-name:
        description: "Backend image name."
        required: true
        type: string
      image-tag:
        description: "Backend image tag."
        required: true
        type: string

jobs:
  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image

      - name: Load Docker image
        run: docker load < backend-image.tar

      - name: Setup PostgreSQL service
        run: |
          docker network create servicehub-network
          docker run -d \
            --network servicehub-network \
            --name postgres \
            -e POSTGRES_DB=servicehub \
            -e POSTGRES_USER=servicehub \
            -e POSTGRES_PASSWORD=${{ secrets.SERVICEHUB_DB_PASSWORD }} \
            -p 5432:5432 \
            postgres:16-alpine
          echo "Waiting for Postgres to accept connections..."
          for i in $(seq 1 24); do
            if docker exec postgres pg_isready -U servicehub -d servicehub > /dev/null 2>&1; then
              echo "Postgres is ready."
              exit 0
            fi
            echo "Postgres not ready yet (${i}/24). Sleeping 5s..."
            sleep 5
          done
          echo "Postgres did not become ready in time."
          docker logs postgres --tail 200 || true
          exit 1

      - name: Run backend container
        run: |
          docker run -d \
            --network servicehub-network \
            --name backend-integration \
            -p 8080:8080 \
            -e SPRING_PROFILES_ACTIVE=test \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/servicehub \
            -e SPRING_DATASOURCE_USERNAME=servicehub \
            -e SPRING_DATASOURCE_PASSWORD=${{ secrets.SERVICEHUB_DB_PASSWORD }} \
            -e SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver \
            -e SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect \
            -e JWT_SECRET=${{ secrets.SERVICEHUB_JWT_SECRET }} \
            "${{ inputs.image-name }}:${{ inputs.image-tag }}"

      - name: Smoke test /actuator/health
        uses: ./.github/actions/log-group
        with:
          title: "Integration smoke /actuator/health"

      - name: Wait and call health endpoint
        run: |
          set -euo pipefail
          echo "Waiting up to 120s for backend health..."
          for i in $(seq 1 24); do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Not ready yet (${i}/24). Sleeping 5s..."
            sleep 5
          done
          echo "Backend did not become healthy in time."
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "==== docker ps ===="
          docker ps -a || true
          echo ""
          echo "==== postgres logs ===="
          docker logs postgres --tail 200 || true
          echo ""
          echo "==== backend logs ===="
          docker logs backend-integration --tail 400 || true

      - name: End integration smoke group
        if: always()
        uses: ./.github/actions/log-group
        with:
          title: "Integration smoke /actuator/health"
          end: "true"
