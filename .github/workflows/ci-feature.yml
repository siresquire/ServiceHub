# =============================================================================
# ServiceHub — Feature Branch CI Pipeline
# =============================================================================
# Triggers:
#   - On pull requests targeting any branch EXCEPT develop or main
#   - On pushes to any feature branch
#
# Pipeline stages:
#   1. Fast Linting (Backend, DataEng, DevOps, QA)
#   2. Fast Unit Testing (Backend JDK Matrix)
#   3. GitLeaks Secret Scan
#
# Note: Deep CodeQL SAST, Docker Image Building, Trivy scanning,
# and Integration Testing are intentionally skipped here to maximize
# developer velocity. They will run when the PR targets 'develop'.
# =============================================================================

name: Feature Branch Fast CI

on:
  push:
    branches-ignore: [main, develop]
  pull_request:
    branches-ignore: [main, develop]

concurrency:
  group: ci-feature-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      dataeng: ${{ steps.filter.outputs.dataeng }}
      devops: ${{ steps.filter.outputs.devops }}
    steps:
      - uses: actions/checkout@v4
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'docker-compose*.yml'
            dataeng:
              - 'data-engineering/**'
            devops:
              - 'devops/**'
              - 'docker-compose*.yml'

  lint-test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/_reusable-lint-test-backend.yml

  lint-data-engineering:
    needs: changes
    if: needs.changes.outputs.dataeng == 'true'
    uses: ./.github/workflows/_reusable-lint-data-engineering.yml

  lint-devops:
    needs: changes
    if: needs.changes.outputs.devops == 'true'
    uses: ./.github/workflows/_reusable-lint-devops.yml

  codeql-java:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/_reusable-codeql-java.yml

  gitleaks:
    name: GitLeaks Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
