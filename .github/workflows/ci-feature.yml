# =============================================================================
# ServiceHub — Feature Branch CI Pipeline
# =============================================================================
# Triggers:
#   - On pull requests targeting any branch EXCEPT develop or main
#   - On pushes to any feature branch
#
# Pipeline stages:
#   1. Fast Linting (Backend, DataEng, DevOps, QA)
#   2. Fast Unit Testing (Backend JDK Matrix)
#   3. GitLeaks Secret Scan
#
# Note: Deep CodeQL SAST, Docker Image Building, Trivy scanning,
# and Integration Testing are intentionally skipped here to maximize
# developer velocity. They will run when the PR targets 'develop'.
# =============================================================================

name: Feature Branch Fast CI

on:
    push:
        branches-ignore: [main, develop]
    pull_request:
        branches-ignore: [main, develop]

concurrency:
    group: ci-feature-${{ github.ref }}
    cancel-in-progress: true

jobs:
    # ===========================================================================
    # Code Quality & Secrets Scan (Parallel Execution)
    # ===========================================================================
    lint-test-backend:
        name: Lint & Test (backend) - JDK ${{ matrix.java }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                java: ["17", "21"]
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up JDK ${{ matrix.java }}
              uses: actions/setup-java@v4
              with:
                  java-version: ${{ matrix.java }}
                  distribution: "temurin"

            - name: Cache Maven packages
              uses: actions/cache@v4
              with:
                  path: ~/.m2/repository
                  key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
                  restore-keys: ${{ runner.os }}-maven-

            - name: Build and Test backend
              working-directory: ./backend
              run: mvn clean test -B

    lint-data-engineering:
        name: Lint (data-engineering)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"
            - name: Install Flake8
              run: pip install flake8
            - name: Run Flake8
              working-directory: ./data-engineering
              run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    lint-devops:
        name: Lint (devops)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Run yamllint
              working-directory: ./devops
              run: |
                  sudo apt-get install -y yamllint
                  yamllint . -d "{extends: relaxed, rules: {line-length: disable}}"

    lint-qa:
        name: Lint (qa)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: QA Linting Placeholder
              run: echo "Depending on the QA framework (Selenium, Cypress, etc.), insert the linter here."

    gitleaks:
        name: GitLeaks Scan
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # needed for gitleaks
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
