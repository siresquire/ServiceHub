# =============================================================================
# ServiceHub — CI/CD Pipeline
# =============================================================================
# Triggers:
#   - On every push to develop
#   - On every pull request targeting develop
#
# Pipeline stages:
#   1. Lint & Test & GitLeaks Scan
#   2. Build Images (Saved as artifacts)
#   3. Trivy Security Scan & Integration Test
#   4. Push Images to ECR (Currently disabled)
# =============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      dataeng: ${{ steps.filter.outputs.dataeng }}
      devops: ${{ steps.filter.outputs.devops }}
    steps:
      - uses: actions/checkout@v4
      - name: Paths filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - 'docker-compose*.yml'
            dataeng:
              - 'data-engineering/**'
            devops:
              - 'devops/**'
              - 'docker-compose*.yml'

  lint-test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/_reusable-lint-test-backend.yml

  lint-data-engineering:
    needs: changes
    if: needs.changes.outputs.dataeng == 'true'
    uses: ./.github/workflows/_reusable-lint-data-engineering.yml

  lint-devops:
    needs: changes
    if: needs.changes.outputs.devops == 'true'
    uses: ./.github/workflows/_reusable-lint-devops.yml

  codeql-java:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/_reusable-codeql-java.yml

  build-images:
    name: Build backend image
    needs:
      - lint-test-backend
      - lint-data-engineering
      - lint-devops
      - codeql-java
    uses: ./.github/workflows/_reusable-build-backend-image.yml
    with:
      image-name: servicehub-backend

  security-scans:
    name: Security scans
    needs: build-images
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/_reusable-security-scans.yml
    with:
      image-name: ${{ needs.build-images.outputs.image-name }}
      image-tag: ${{ needs.build-images.outputs.image-tag }}

  integration-test:
    name: Integration smoke test
    needs: build-images
    uses: ./.github/workflows/_reusable-integration-smoke.yml
    with:
      image-name: ${{ needs.build-images.outputs.image-name }}
      image-tag: ${{ needs.build-images.outputs.image-tag }}
    secrets:
      SERVICEHUB_DB_PASSWORD: ${{ secrets.SERVICEHUB_DB_PASSWORD }}
      SERVICEHUB_JWT_SECRET: ${{ secrets.SERVICEHUB_JWT_SECRET }}
