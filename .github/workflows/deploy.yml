# =============================================================================
# ServiceHub — Continuous Deployment Pipeline
# =============================================================================
# Triggers:
#   - Only on push to main (after a PR is merged)
#
# Pipeline stages:
#   1. Build Docker image (reuses CI build logic)
#   2. Push to Amazon ECR (via OIDC)
#   3. Deploy to ECS Fargate (render task def → deploy → wait for stability)
#   4. Smoke test ALB health endpoint
#
# Required GitHub Secrets:
#   - AWS_ROLE_ARN    — IAM role ARN for OIDC authentication
#   - AWS_REGION      — AWS region (eu-west-1)
#   - AWS_ACCOUNT_ID  — 12-digit AWS account ID
#
# Required GitHub Variables (or hardcode below):
#   - ECS_CLUSTER     — ECS cluster name
#   - ECS_SERVICE     — ECS service name
#   - CONTAINER_NAME  — Container name in the task definition
# =============================================================================

name: Deploy Pipeline

on:
  push:
    branches: [main, feature/servicehub-updates]
  workflow_dispatch:

# Only one deployment at a time.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  ECS_CLUSTER: servicehub-staging-cluster
  ECS_SERVICE: servicehub-staging-backend
  CONTAINER_NAME: servicehub-backend

jobs:
  # ===========================================================================
  # Job 1: Build Docker Image
  # ===========================================================================
  # Reuses the same build workflow as CI to ensure consistency.
  # Produces a backend-image artifact for the ECR publish step.
  # ===========================================================================
  build-image:
    name: Build backend image
    uses: ./.github/workflows/_reusable-build-backend-image.yml
    with:
      image-name: servicehub-backend

  # ===========================================================================
  # Job 2: Publish to ECR
  # ===========================================================================
  # Takes the build artifact and pushes it to Amazon ECR.
  # Tags: commit SHA + latest
  # ===========================================================================
  publish-ecr:
    name: Publish to ECR
    needs: build-image
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication with AWS
    uses: ./.github/workflows/_reusable-publish-ecr.yml
    with:
      image-name: ${{ needs.build-image.outputs.image_name }}
      image-tag: ${{ needs.build-image.outputs.image_tag }}
    secrets: inherit # pragma: allowlist secret

  # ===========================================================================
  # Debug Job - Check outputs
  # ===========================================================================
  debug-outputs:
    name: Debug Outputs
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Show build outputs
        run: |
          echo "build-image.outputs.image_name: '${{ needs.build-image.outputs.image_name }}'"
          echo "build-image.outputs.image_tag: '${{ needs.build-image.outputs.image_tag }}'"

  # ===========================================================================
  # Job 3: Deploy to ECS Fargate
  # ===========================================================================
  # Renders a new task definition with the updated image tag,
  # deploys it to ECS, and waits for service stability.
  # ===========================================================================
  deploy-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: publish-ecr

    permissions:
      contents: read
      id-token: write # Required for OIDC

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.publish-ecr.outputs.ecr-image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Deployment summary
        run: |
          echo "========================================="
          echo " Deployment successful!"
          echo " Cluster: ${{ env.ECS_CLUSTER }}"
          echo " Service: ${{ env.ECS_SERVICE }}"
          echo " Image:   ${{ needs.publish-ecr.outputs.ecr-image }}"
          echo " Commit:  ${{ github.sha }}"
          echo "========================================="

  # ===========================================================================
  # Job 4: Smoke Test
  # ===========================================================================
  # Verifies that the deployed service is healthy via the ALB endpoint.
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-ecs

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get ALB DNS name
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names servicehub-staging-alb \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "dns=${ALB_DNS}" >> "${GITHUB_OUTPUT}"
          echo "ALB DNS: ${ALB_DNS}"

      - name: Health check
        run: |
          echo "Waiting 30s for tasks to register with ALB..."
          sleep 30

          echo "Checking health endpoint..."
          for i in $(seq 1 5); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "http://${{ steps.alb.outputs.dns }}/actuator/health" || echo "000")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"
            if [ "${HTTP_CODE}" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
