# =============================================================================
# ServiceHub — Development Profile (application-dev.yml)
# =============================================================================
# Activated when: SPRING_PROFILES_ACTIVE=dev
# Used for: Local Docker development via docker-compose
#
# Overrides from base application.yml:
#   - Enables SQL logging for debugging
#   - Disables Thymeleaf caching for live template reloading
#   - Sets verbose logging for ServiceHub classes
# =============================================================================

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:servicehub}
    password: ${SPRING_DATASOURCE_PASSWORD:servicehub_dev}  # pragma: allowlist secret
    driver-class-name: org.postgresql.Driver
  mail:
    host: smtp.test.com
    port: 587
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # --- JPA / Hibernate ---
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # --- Data Initialization ---
  # Seed data (data.sql) is loaded on startup.
  # Set to "never" in production if using Flyway/Liquibase.
  sql:
    init:
      mode: never

  # --- Thymeleaf Template Engine ---
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    cache: false

  flyway:
    enabled: true


logging:
  level:
    com.servicehub: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
