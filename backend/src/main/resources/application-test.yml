# =============================================================================
# ServiceHub — Test Profile (application-test.yml)
# =============================================================================
# Activated when: SPRING_PROFILES_ACTIVE=test
# Used for: CI/CD pipeline, unit tests, integration tests
#
# Overrides from base application.yml:
#   - Uses separate test database (or CI-provided Postgres)
#   - Disables SQL logging to keep test output clean
#   - Uses create-drop for a clean DB on each test run
#   - Disables data.sql seed data (tests manage their own fixtures)
# =============================================================================

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  sql:
    init:
      mode: never

logging:
  level:
    root: WARN
    com.servicehub: INFO

app:
  sla:
    sla-breach-notification:
      enabled: false
      admin-email: ${SPRING_EMAIL_ADMIN_ADDRES:test@mail.com}
    sla-breach-check-interval: ${SLA_BREACH_CHECK_INTERVAL:900000}