<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ServiceHub — All Tickets</title>
    <th:block th:replace="~{fragments/layout :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar}"></th:block>

<main class="main">
    <header th:replace="~{fragments/layout :: topbar('All Tickets', 'Service Request Management')}"></header>

    <div class="content">
        <!-- STATS -->
        <div class="stats">
            <div class="sc active" onclick="filterStatus('all',this)">
                <div class="si ic-b"><i class="bi bi-ticket-detailed"></i></div>
                <div><div class="sv" th:text="${tickets != null ? tickets.size() : 0}">0</div><div class="sl">All Tickets</div></div>
            </div>
            <div class="sc" onclick="filterStatus('OPEN',this)">
                <div class="si ic-b"><i class="bi bi-envelope-open"></i></div>
                <div><div class="sv" th:text="${openCount ?: 0}">0</div><div class="sl">Open</div></div>
            </div>
            <div class="sc" onclick="filterStatus('IN_PROGRESS',this)">
                <div class="si ic-a"><i class="bi bi-gear-fill"></i></div>
                <div><div class="sv" th:text="${inProgressCount ?: 0}">0</div><div class="sl">In Progress</div></div>
            </div>
            <div class="sc" onclick="filterStatus('RESOLVED',this)">
                <div class="si ic-g"><i class="bi bi-check-circle-fill"></i></div>
                <div><div class="sv" th:text="${resolvedCount ?: 0}">0</div><div class="sl">Resolved</div></div>
            </div>
            <div class="sc" onclick="filterStatus('CLOSED',this)">
                <div class="si ic-t"><i class="bi bi-lock-fill"></i></div>
                <div><div class="sv" th:text="${closedCount ?: 0}">0</div><div class="sl">Closed</div></div>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="search-wrap">
                <i class="bi bi-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search tickets..." oninput="search(this.value)"/>
            </div>
            <select class="filter" onchange="filterDept(this.value)">
                <option value="">All Departments</option>
                <option th:each="d : ${departments}" th:value="${d.name}" th:text="${d.name}">IT Support</option>
            </select>
            <select class="filter" onchange="filterPriority(this.value)">
                <option value="">All Priorities</option>
                <option value="CRITICAL">Critical</option>
                <option value="HIGH">High</option>
                <option value="MEDIUM">Medium</option>
                <option value="LOW">Low</option>
            </select>
        </div>

        <!-- TABLE -->
        <div class="panel">
            <div class="ph">
                <div class="pt"><i class="bi bi-ticket-detailed"></i> Service Requests</div>
                <span class="tc" id="ticketCount" th:text="${tickets != null ? tickets.size() + ' tickets' : '0 tickets'}">0 tickets</span>
            </div>
            <div class="tbl-wrap">
                <table class="tbl" id="ticketTable">
                    <thead>
                    <tr>
                        <th>#ID</th>
                        <th>Title</th>
                        <th>Department</th>
                        <th>Requester</th>
                        <th>Status</th>
                        <th>Priority</th>
                        <th>SLA</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody id="ticketBody">
                    <tr th:each="t : ${tickets}"
                        th:data-id="${t.id}"
                        th:data-status="${t.status}"
                        th:data-dept="${t.department != null ? t.department.name : ''}"
                        th:data-priority="${t.priority}"
                        th:data-title="${t.title}">
                        <td class="t-id"><a th:href="@{/requests/{id}(id=${t.id})}" style="color:var(--teal);font-weight:600;text-decoration:none;" th:text="'#' + ${t.id}">#1</a></td>
                        <td class="t-title"><a th:href="@{/requests/{id}(id=${t.id})}" style="color:inherit;text-decoration:none;" th:text="${t.title}">Ticket title</a></td>
                        <td class="t-dept" th:text="${t.department != null ? t.department.name : '—'}">IT Support</td>
                        <td>
                            <div class="t-req">
                                <div class="t-av2" th:text="${t.requester != null ? t.requester.fullName.substring(0,2).toUpperCase() : 'NA'}">NA</div>
                                <span style="font-size:11.5px;" th:text="${t.requester != null ? t.requester.fullName : 'N/A'}">User</span>
                            </div>
                        </td>
                        <td>
                                <span class="pill"
                                      th:classappend="${t.status.name()=='OPEN'}?'p-open':(${t.status.name()=='IN_PROGRESS'}?'p-prog':'p-done')"
                                      th:text="${t.status.name().replace('_',' ')}">OPEN</span>
                        </td>
                        <td>
                                <span class="pill"
                                      th:classappend="${t.priority.name()=='HIGH' or t.priority.name()=='CRITICAL'}?'p-hi':(${t.priority.name()=='MEDIUM'}?'p-med':'p-lo')"
                                      th:text="${t.priority}">MED</span>
                        </td>
                        <td>
                                <span th:if="${t.slaBreached}" class="sla-breach"><i class="bi bi-exclamation-triangle-fill"></i> Breached</span>
                                <span th:if="${!t.slaBreached and t.resolutionSlaDeadline!=null}" class="sla-ok"><i class="bi bi-check-circle"></i> On track</span>
                                <span th:if="${!t.slaBreached and t.resolutionSlaDeadline==null}" style="color:var(--muted);font-size:11px;">—</span>
                        </td>
                        <td class="t-date" th:text="${#temporals.format(t.createdAt,'MMM dd, yyyy')}">Mar 11</td>
                        <td>
                            <div class="act-group">
                                <button class="act-btn btn-assign"
                                        th:if="${t.assignedTo == null}"
                                        th:data-id="${t.id}"
                                        onclick="handleOpenAssignModal(this)"><i class="bi bi-person-plus"></i> Assign</button>
                                <button class="act-btn btn-start"
                                        th:if="${t.status.name() == 'OPEN' or t.status.name() == 'ASSIGNED'}"
                                        th:data-id="${t.id}"
                                        data-status="IN_PROGRESS"
                                        onclick="handleUpdateStatus(this)"><i class="bi bi-play-fill"></i> Start</button>
                                <button class="act-btn btn-resolve"
                                        th:if="${t.status.name() == 'IN_PROGRESS'}"
                                        th:data-id="${t.id}"
                                        data-status="RESOLVED"
                                        onclick="handleUpdateStatus(this)"><i class="bi bi-check-lg"></i> Resolve</button>
                                <button class="act-btn btn-close-ticket"
                                        th:if="${t.status.name() != 'CLOSED' and t.status.name() != 'RESOLVED'}"
                                        th:data-id="${t.id}"
                                        data-status="CLOSED"
                                        onclick="handleUpdateStatus(this)"><i class="bi bi-x-lg"></i> Close</button>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="empty" th:if="${tickets==null or tickets.empty}">
                <div class="empty-icon"><i class="bi bi-inbox"></i></div>
                No tickets found
            </div>
        </div>
    </div>
</main>

<!-- ASSIGN AGENT MODAL -->
<div class="modal-overlay" id="assignModal">
    <div class="modal-box">
        <div class="modal-title"><i class="bi bi-person-plus-fill"></i> Assign Agent</div>
        <div class="modal-group">
            <label for="agentSelect">Select Agent</label>
            <select id="agentSelect" name="agentId">
                <option value="">Loading agents...</option>
            </select>
        </div>
        <div class="modal-btns">
            <button class="modal-btn-cancel" onclick="closeAssignModal()">Cancel</button>
            <button class="modal-btn-confirm" onclick="confirmAssign()">Assign</button>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

<script>

    let activeStatus='all', activeDept='', activePriority='', activeSearch='';
    let assignTicketId = null;

    function applyFilters(){
        const rows=document.querySelectorAll('#ticketBody tr');
        let visible=0;
        rows.forEach(row=>{
            const s=row.dataset.status, d=row.dataset.dept, p=row.dataset.priority, t=row.dataset.title?.toLowerCase()||'';
            const show=(activeStatus==='all'||s===activeStatus)&&
                       (activeDept===''||d===activeDept)&&
                       (activePriority===''||p===activePriority)&&
                       (activeSearch===''||t.includes(activeSearch));
            row.style.display=show?'':'none';
            if(show) visible++;
        });
        document.getElementById('ticketCount').textContent=visible+' tickets';
    }
    function filterStatus(s,btn){
        activeStatus=s;
        document.querySelectorAll('.sc').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
    }
    function filterDept(d){activeDept=d;applyFilters();}
    function filterPriority(p){activePriority=p;applyFilters();}
    function search(v){activeSearch=v.toLowerCase();applyFilters();}

    function handleUpdateStatus(btn) {
        updateTicketStatus(btn.dataset.id, btn.dataset.status);
    }

    function handleOpenAssignModal(btn) {
        openAssignModal(btn.dataset.id);
    }

    function updateTicketStatus(ticketId, newStatus) {
        const labels = { IN_PROGRESS: 'start working on', RESOLVED: 'resolve', CLOSED: 'close' };
        if (!confirm('Are you sure you want to ' + (labels[newStatus] || newStatus.toLowerCase()) + ' ticket #' + ticketId + '?')) return;
        fetch('/api/requests/' + ticketId + '/status', {
            method: 'PUT', credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ newStatus: newStatus })
        })
        .then(r => { if (r.ok) location.reload(); else r.json().then(d => alert(d.message || 'Failed to update status')).catch(() => alert('Failed to update status')); })
        .catch(() => alert('Network error'));
    }

    function openAssignModal(ticketId) {
        assignTicketId = ticketId;
        const row = document.querySelector(`#ticketBody tr[data-id="${ticketId}"]`) ||
                    document.querySelector(`#ticketBody tr:has(.t-id a[href$="/${ticketId}"])`);
        const ticketDept = row ? row.dataset.dept : '';

        const modal = document.getElementById('assignModal');
        modal.classList.add('show');

        const sel = document.getElementById('agentSelect');
        sel.innerHTML = '<option value="">Loading...</option>';

        fetch('/api/admin/users', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(users => {
                const agents = users.filter(u => {
                    if (u.role !== 'AGENT' && u.role !== 'ADMIN') return false;
                    if (ticketDept && u.role === 'AGENT') {
                        return u.department === ticketDept;
                    }
                    return true;
                });

                sel.innerHTML = '<option value="">— Select an agent —</option>';
                if (agents.length === 0) {
                    sel.innerHTML = '<option value="">No agents found in this department</option>';
                } else {
                    agents.forEach(a => {
                        const opt = document.createElement('option');
                        opt.value = a.id;
                        opt.textContent = a.fullName + ' (' + (a.department || a.role) + ')';
                        sel.appendChild(opt);
                    });
                }
            })
            .catch(() => { sel.innerHTML = '<option value="">Failed to load agents</option>'; });
    }

    function closeAssignModal() {
        document.getElementById('assignModal').classList.remove('show');
        assignTicketId = null;
    }

    function confirmAssign() {
        const agentId = document.getElementById('agentSelect').value;
        if (!assignTicketId || !agentId) {
            alert('Please select an agent');
            return;
        }
        fetch('/api/requests/' + assignTicketId + '/assign/' + agentId, {
            method: 'PUT', credentials: 'same-origin'
        })
        .then(r => { if (r.ok) location.reload(); else alert('Failed to assign ticket'); })
        .catch(() => alert('Network error'));
    }

</script>
</body>
</html>
