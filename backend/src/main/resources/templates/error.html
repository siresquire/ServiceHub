<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error - ServiceHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .error-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: 700;
            color: #ef4444;
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }
        .error-message {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #0fbf8a;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            border: none;
            cursor: pointer;
            margin: 5px;
        }
        .btn:hover { background: #0da87a; }
        .btn-secondary {
            background: #e2e8f0;
            color: #1e293b;
        }
        .btn-secondary:hover { background: #cbd5e1; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">⚠️</div>
        <div class="error-code" th:text="${status ?: '500'}">500</div>
        <div class="error-title" th:text="${error ?: 'Something went wrong'}">Something went wrong</div>
        <div class="error-message" th:text="${message ?: 'An unexpected error occurred. Please try again later.'}">
            An unexpected error occurred. Please try again later.
        </div>
        <div>
            <a href="/" class="btn">Go Home</a>
            <a href="/auth/login" class="btn btn-secondary">Login</a>
        </div>
    </div>
</body>
</html>
