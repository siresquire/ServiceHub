<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ServiceHub — My Profile</title>
    <th:block th:replace="~{fragments/layout :: styles}"></th:block>
    <style>
        .profile-card { background: var(--white); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .profile-hdr { padding: 18px 20px; border-bottom: 1px solid var(--border); background: #fafbfc; display: flex; align-items: center; gap: 10px; }
        .profile-hdr i { color: var(--teal); font-size: 18px; }
        .profile-hdr h3 { margin: 0; font-size: 15px; font-weight: 700; }
        .profile-body { padding: 20px; }
        .field { margin-bottom: 14px; }
        .field label { font-size: 12px; font-weight: 600; color: var(--txt); display: block; margin-bottom: 6px; }
        .field input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: var(--font); font-size: 13px; color: var(--txt); background: var(--white); outline: none; transition: border-color .15s; }
        .field input:focus { border-color: var(--teal); }
        .field .readonly { background: #f8fafc; cursor: default; }
        .field .error-text { color: var(--red); font-size: 11px; margin-top: 4px; }
    </style>
</head>
<body>

<th:block th:replace="~{fragments/layout :: sidebar}"></th:block>

<main class="main">
    <header th:replace="~{fragments/layout :: topbar('My Profile', 'Manage your account information')}"></header>

    <div class="content">
        <!-- SUCCESS/ERROR -->
        <div th:if="${success ?: param.success}" class="alert-banner success"><i class="bi bi-check-circle-fill"></i> <span th:text="${success ?: param.success}">Profile updated</span></div>
        <div th:if="${error ?: param.error}" class="alert-banner error"><i class="bi bi-exclamation-circle-fill"></i> <span th:text="${error ?: param.error}">An error occurred</span></div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <!-- PROFILE INFO -->
            <div class="profile-card">
                <div class="profile-hdr">
                    <i class="bi bi-person-circle"></i>
                    <h3>Profile Information</h3>
                </div>
                <div class="profile-body">
                    <form th:action="@{/profile/update}" method="post">
                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="field">
                            <label for="fullName">Full Name</label>
                            <input type="text" id="fullName" name="fullName" th:value="${user.fullName}" required/>
                            <div th:if="${nameError}" class="error-text" th:text="${nameError}">Error</div>
                        </div>
                        <div class="field">
                            <label for="profileEmail">Email</label>
                            <input type="email" id="profileEmail" th:value="${user.email}" class="readonly" readonly/>
                        </div>
                        <div class="field">
                            <label for="profileRole">Role</label>
                            <input type="text" id="profileRole" th:value="${user.role}" class="readonly" readonly/>
                        </div>
                        <button type="submit" class="btn-teal" style="margin-top: 6px;"><i class="bi bi-check-lg"></i> Save Changes</button>
                    </form>
                </div>
            </div>

            <!-- CHANGE PASSWORD -->
            <div class="profile-card">
                <div class="profile-hdr">
                    <i class="bi bi-shield-lock"></i>
                    <h3>Change Password</h3>
                </div>
                <div class="profile-body">
                    <form th:action="@{/profile/update}" method="post">
                        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="field">
                            <label for="currentPassword">Current Password</label>
                            <input type="password" id="currentPassword" name="currentPassword" required/>
                            <div th:if="${currentPasswordError}" class="error-text" th:text="${currentPasswordError}">Error</div>
                        </div>
                        <div class="field">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" name="newPassword" required/>
                            <div th:if="${newPasswordError}" class="error-text" th:text="${newPasswordError}">Error</div>
                        </div>
                        <div class="field">
                            <label for="confirmPassword">Confirm New Password</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" required/>
                            <div th:if="${confirmPasswordError}" class="error-text" th:text="${confirmPasswordError}">Error</div>
                        </div>
                        <button type="submit" class="btn-teal" style="margin-top: 6px;"><i class="bi bi-lock"></i> Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
