<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ServiceHub — My Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root{--sb:#1a1f2e;--bg:#f0f2f5;--w:#fff;--teal:#0fbf8a;--teal-bg:#e8faf4;
            --red:#ef4444;--red-bg:#fff1f1;--green:#22c55e;--green-bg:#f0fdf4;
            --txt:#1e293b;--muted:#94a3b8;--bdr:#e2e8f0;--sw:215px;--font:'DM Sans',sans-serif;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{overflow-x:hidden;}
        body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;min-height:100vh;}
        .sidebar{width:var(--sw);background:var(--sb);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:200;transition:transform .25s ease;overflow-y:auto;}
        .logo{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;}
        .logo-icon{width:32px;height:32px;min-width:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;}
        .logo-text{font-size:15px;font-weight:700;color:#fff;}
        .nav-sep{font-size:10px;font-weight:600;letter-spacing:1px;color:#3d4a5c;text-transform:uppercase;padding:12px 18px 4px;}
        .nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;font-weight:500;color:#8892a4;text-decoration:none;transition:all .12s;}
        .nav-item:hover{color:#fff;background:rgba(255,255,255,.06);}
        .nav-item.active{color:var(--teal);background:rgba(15,191,138,.1);}
        .nav-icon{font-size:14px;width:17px;text-align:center;flex-shrink:0;}
        .sf{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:9px;}
        .sa{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}
        .overlay.show{display:block;}
        .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-width:0;max-width:calc(100vw - var(--sw));}
        .topbar{display:flex;align-items:center;padding:0 20px;height:56px;background:var(--w);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;gap:8px;}
        .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt);flex-shrink:0;}
        .tb-wrap{flex:1;min-width:0;}
        .tb-title{font-size:15px;font-weight:700;}
        .tb-sub{font-size:11px;color:var(--muted);}
        .t-av{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
        .content{padding:20px;flex:1;}
        .detail-card{background:var(--w);border:1px solid var(--bdr);border-radius:12px;padding:24px;margin-bottom:18px;max-width:480px;}
        .detail-title{font-size:16px;font-weight:600;margin-bottom:18px;}
        .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
        label{font-size:12px;font-weight:500;color:var(--txt);}
        input{border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;font-size:13px;font-family:var(--font);color:var(--txt);background:var(--w);outline:none;}
        input:focus{border-color:var(--teal);}
        .btn-teal{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);}
        .btn-teal:hover{background:#0da87a;}
        .alert-banner{border-radius:10px;padding:11px 14px;margin-bottom:18px;font-size:13px;max-width:480px;}
        .alert-banner.success{background:var(--green-bg);border-left:4px solid var(--green);color:#166534;}
        .alert-banner.error{background:var(--red-bg);border-left:4px solid var(--red);color:#b91c1c;}
        .pw-sub{font-size:11px;color:var(--muted);margin-top:2px;}
        @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;max-width:100vw;}.menu-btn{display:flex;}.content{padding:12px;}}
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo"><div class="logo-icon">S</div><span class="logo-text">ServiceHub</span></div>
    <div class="nav-sep">Menu</div>
    <a class="nav-item" th:href="${user != null and user.role.name() == 'ADMIN'} ? @{/admin/dashboard} : (${user != null and user.role.name() == 'AGENT'} ? @{/agent/dashboard} : @{/user/dashboard})"><span class="nav-icon">⊞</span> Dashboard</a>
    <a class="nav-item" th:href="${user != null and user.role.name() == 'ADMIN'} ? @{/admin/tickets} : (${user != null and user.role.name() == 'AGENT'} ? @{/agent/tickets} : @{/user/tickets})"><span class="nav-icon">🎫</span> Tickets</a>
    <a class="nav-item active" href="/profile"><span class="nav-icon">👤</span> Profile</a>
    <div class="sf">
        <div class="sa" th:text="${user != null ? user.fullName.substring(0,2).toUpperCase() : 'ME'}">ME</div>
        <div style="flex:1;min-width:0;">
            <div style="font-size:12px;font-weight:600;color:#fff;" th:text="${user != null ? user.fullName : 'User'}">User</div>
            <div style="font-size:11px;color:#8892a4;" th:text="${user != null ? user.role : ''}">User</div>
        </div>
        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none;border:none;color:#8892a4;font-size:14px;cursor:pointer;">⇒</button>
        </form>
    </div>
</aside>

<main class="main">
    <header class="topbar">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <div class="tb-wrap">
            <div class="tb-title">My Profile</div>
            <div class="tb-sub">View and update your account information</div>
        </div>
        <div class="tb-actions">
            <div class="t-av" th:text="${user != null ? user.fullName.substring(0,2).toUpperCase() : 'ME'}">ME</div>
        </div>
    </header>

    <div class="content">
        <div th:if="${success}" class="alert-banner success" th:text="${success}">Success</div>
        <div th:if="${error}" class="alert-banner error" th:text="${error}">Error</div>

        <div class="detail-card">
            <div class="detail-title">👤 Profile Information</div>
            <form th:action="@{/profile/update}" method="post">
                <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" th:value="${user != null ? user.fullName : ''}" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="text" th:value="${user != null ? user.email : ''}" disabled style="background:#f1f5f9;color:var(--muted);"/>
                    <span class="pw-sub">Email cannot be changed</span>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" th:value="${user != null ? user.role : ''}" disabled style="background:#f1f5f9;color:var(--muted);"/>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <input type="text" th:value="${user != null and user.department != null ? user.department.name : 'N/A'}" disabled style="background:#f1f5f9;color:var(--muted);"/>
                </div>
                <div class="detail-title" style="margin-top:24px;margin-bottom:12px;">🔒 Change Password</div>
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" name="currentPassword" placeholder="Leave blank to keep current"/>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" name="newPassword" placeholder="Min. 6 characters"/>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-teal">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</main>

<script>
    function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
</script>
</body>
</html>
