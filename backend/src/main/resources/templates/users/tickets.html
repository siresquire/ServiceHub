<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ServiceHub — My Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root{--sb:#1a1f2e;--bg:#f0f2f5;--w:#fff;--teal:#0fbf8a;--teal-bg:#e8faf4;
            --amber:#f59e0b;--amber-bg:#fff8ec;--blue:#3b82f6;--blue-bg:#eff6ff;
            --red:#ef4444;--red-bg:#fff1f1;--green:#22c55e;--green-bg:#f0fdf4;
            --txt:#1e293b;--muted:#94a3b8;--bdr:#e2e8f0;--sw:215px;--font:'DM Sans',sans-serif;}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html,body{overflow-x:hidden;}
        body{font-family:var(--font);background:var(--bg);color:var(--txt);display:flex;min-height:100vh;}
        .sidebar{width:var(--sw);background:var(--sb);display:flex;flex-direction:column;position:fixed;height:100vh;z-index:200;transition:transform .25s ease;overflow-y:auto;}
        .logo{display:flex;align-items:center;gap:10px;padding:20px 18px 16px;flex-shrink:0;}
        .logo-icon{width:32px;height:32px;min-width:32px;background:var(--teal);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;font-weight:800;}
        .logo-text{font-size:15px;font-weight:700;color:#fff;}
        .nav-sep{font-size:10px;font-weight:600;letter-spacing:1px;color:#3d4a5c;text-transform:uppercase;padding:12px 18px 4px;}
        .nav-item{display:flex;align-items:center;gap:9px;padding:9px 18px;font-size:13px;font-weight:500;color:#8892a4;text-decoration:none;transition:all .12s;}
        .nav-item:hover{color:#fff;background:rgba(255,255,255,.06);}
        .nav-item.active{color:var(--teal);background:rgba(15,191,138,.1);}
        .nav-icon{font-size:14px;width:17px;text-align:center;flex-shrink:0;}
        .sf{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:9px;flex-shrink:0;}
        .sa{width:30px;height:30px;min-width:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;}
        .sn{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .sr{font-size:11px;color:#8892a4;}
        .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:199;}
        .overlay.show{display:block;}
        .main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-width:0;max-width:calc(100vw - var(--sw));}
        .topbar{display:flex;align-items:center;padding:0 20px;height:56px;background:var(--w);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:100;gap:8px;}
        .menu-btn{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--txt);flex-shrink:0;}
        .tb-wrap{flex:1;min-width:0;}
        .tb-title{font-size:15px;font-weight:700;}
        .tb-sub{font-size:11px;color:var(--muted);}
        .tb-actions{display:flex;align-items:center;gap:7px;flex-shrink:0;}
        .btn-primary{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);text-decoration:none;white-space:nowrap;}
        .btn-primary:hover{background:#0da87a;}
        .t-av{width:32px;height:32px;min-width:32px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;}
        .content{padding:20px;flex:1;}

        /* FILTER TABS */
        .ftabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:2px;flex-wrap:nowrap;}
        .ftab{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--bdr);background:var(--w);color:var(--muted);cursor:pointer;white-space:nowrap;font-family:var(--font);transition:all .12s;}
        .ftab.active,.ftab:hover{background:var(--teal-bg);border-color:var(--teal);color:var(--teal);}

        /* NEW REQUEST FORM */
        .form-card{background:var(--w);border:1px solid var(--bdr);border-radius:12px;padding:20px;margin-bottom:18px;display:none;}
        .form-card.open{display:block;}
        .form-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
        .form-group{display:flex;flex-direction:column;gap:5px;}
        .form-group.full{grid-column:1/-1;}
        label{font-size:12px;font-weight:500;color:var(--txt);}
        input,select,textarea{border:1px solid var(--bdr);border-radius:8px;padding:8px 12px;font-size:13px;font-family:var(--font);color:var(--txt);background:var(--bg);outline:none;transition:border-color .12s;width:100%;}
        input:focus,select:focus,textarea:focus{border-color:var(--teal);background:var(--w);}
        textarea{resize:vertical;min-height:80px;}
        .form-actions{display:flex;gap:8px;justify-content:flex-end;}
        .btn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--bdr);border-radius:8px;padding:7px 16px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);}

        /* TICKET LIST */
        .panel{background:var(--w);border:1px solid var(--bdr);border-radius:12px;overflow:hidden;}
        .ph{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bdr);}
        .pt{font-size:13px;font-weight:600;}
        .tc{font-size:11px;color:var(--muted);}
        .tr{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;border-bottom:1px solid var(--bdr);transition:background .1s;}
        .tr:last-child{border-bottom:none;}
        .tr:hover{background:#fafbfc;}
        .tr-icon{width:34px;height:34px;min-width:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
        .tr-body{flex:1;min-width:0;}
        .tr-title{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
        .tr-meta{font-size:11px;color:var(--muted);margin-bottom:4px;}
        .tr-desc{font-size:11.5px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:400px;}
        .tr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
        .pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap;}
        .p-open{background:var(--blue-bg);color:var(--blue);}
        .p-prog{background:var(--amber-bg);color:var(--amber);}
        .p-done{background:var(--green-bg);color:var(--green);}
        .p-hi{background:var(--red-bg);color:var(--red);}
        .p-med{background:var(--amber-bg);color:var(--amber);}
        .p-lo{background:var(--teal-bg);color:var(--teal);}
        .tr-date{font-size:10.5px;color:var(--muted);}
        .empty{text-align:center;padding:40px 16px;color:var(--muted);}
        .empty-icon{font-size:32px;margin-bottom:10px;}
        .empty p{font-size:13px;margin-bottom:14px;}

        @media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.main{margin-left:0;max-width:100vw;}.menu-btn{display:flex;}.form-grid{grid-template-columns:1fr;}.content{padding:12px;}.topbar{padding:0 12px;}}
    </style>
</head>
<body>
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="logo"><div class="logo-icon">S</div><span class="logo-text">ServiceHub</span></div>
    <div class="nav-sep">My Space</div>
    <a class="nav-item" href="/user/dashboard"><span class="nav-icon">⊞</span> Dashboard</a>
    <a class="nav-item active" href="/user/tickets"><span class="nav-icon">🎫</span> My Tickets</a>
    <div class="sf">
        <div class="sa" th:text="${user != null ? user.fullName.substring(0,2).toUpperCase() : 'ME'}">ME</div>
        <div style="flex:1;min-width:0;">
            <div class="sn" th:text="${user != null ? user.fullName : 'User'}">User</div>
            <div class="sr">Employee</div>
        </div>
        <form th:action="@{/auth/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:none;border:none;color:#8892a4;font-size:14px;cursor:pointer;">⇒</button>
        </form>
    </div>
</aside>

<main class="main">
    <header class="topbar">
        <button class="menu-btn" onclick="openSidebar()">☰</button>
        <div class="tb-wrap">
            <div class="tb-title">My Tickets</div>
            <div class="tb-sub">View and manage your service requests</div>
        </div>
        <div class="tb-actions">
            <div class="t-av" th:text="${user != null ? user.fullName.substring(0,2).toUpperCase() : 'ME'}">ME</div>
            <button class="btn-primary" onclick="toggleForm()">+ New Request</button>
        </div>
    </header>

    <div class="content">
        <!-- NEW REQUEST FORM -->
        <div class="form-card" id="newRequestForm">
            <div class="form-title">
                <span>📝 Submit a New Request</span>
                <button onclick="toggleForm()" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);">✕</button>
            </div>
            <form th:action="@{/api/tickets}" method="post">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Title *</label>
                        <input type="text" name="title" placeholder="Brief description of your issue" required/>
                    </div>
                    <div class="form-group">
                        <label>Department *</label>
                        <select name="departmentId" required>
                            <option value="">Select department...</option>
                            <option th:each="d : ${departments}" th:value="${d.id}" th:text="${d.name}">IT Support</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <select name="priority">
                            <option value="LOW">Low</option>
                            <option value="MEDIUM" selected>Medium</option>
                            <option value="HIGH">High</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Description *</label>
                        <textarea name="description" placeholder="Describe your issue in detail..." required></textarea>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="toggleForm()">Cancel</button>
                    <button type="submit" class="btn-primary">Submit Request</button>
                </div>
            </form>
        </div>

        <!-- FILTER TABS -->
        <div class="ftabs">
            <button class="ftab active" onclick="filterTickets('all',this)">All</button>
            <button class="ftab" onclick="filterTickets('OPEN',this)">Open</button>
            <button class="ftab" onclick="filterTickets('IN_PROGRESS',this)">In Progress</button>
            <button class="ftab" onclick="filterTickets('RESOLVED',this)">Resolved</button>
            <button class="ftab" onclick="filterTickets('CLOSED',this)">Closed</button>
        </div>

        <!-- TICKET LIST -->
        <div class="panel">
            <div class="ph">
                <div class="pt">🎫 My Requests</div>
                <span class="tc" th:text="${tickets != null ? tickets.size() + ' total' : '0 total'}">0 total</span>
            </div>

            <div id="ticketList">
                <div class="tr" th:each="t : ${tickets}"
                     th:data-status="${t.status}">
                    <div class="tr-icon"
                         th:style="${t.priority.name() == 'HIGH' or t.priority.name() == 'CRITICAL'} ? 'background:var(--red-bg)' : (${t.priority.name() == 'MEDIUM'} ? 'background:var(--amber-bg)' : 'background:var(--teal-bg)')">
                        <span th:text="${t.priority.name() == 'HIGH' or t.priority.name() == 'CRITICAL'} ? '🔴' : (${t.priority.name() == 'MEDIUM'} ? '🟡' : '🟢')">🟡</span>
                    </div>
                    <div class="tr-body">
                        <div class="tr-title" th:text="${t.title}">Ticket title</div>
                        <div class="tr-meta" th:text="${t.category} + ' · ' + (${t.department != null ? t.department.name : 'Unassigned'}) + ' · #' + ${t.id}">Category · Dept</div>
                        <div class="tr-desc" th:text="${t.description}">Description</div>
                    </div>
                    <div class="tr-right">
                        <span class="pill"
                              th:classappend="${t.status.name() == 'OPEN'} ? 'p-open' : (${t.status.name() == 'IN_PROGRESS'} ? 'p-prog' : 'p-done')"
                              th:text="${t.status.name().replace('_',' ')}">OPEN</span>
                        <span class="pill"
                              th:classappend="${t.priority.name() == 'HIGH' or t.priority.name() == 'CRITICAL'} ? 'p-hi' : (${t.priority.name() == 'MEDIUM'} ? 'p-med' : 'p-lo')"
                              th:text="${t.priority}">MEDIUM</span>
                        <span class="tr-date" th:text="${#temporals.format(t.createdAt,'MMM dd, yyyy')}">Mar 11</span>
                    </div>
                </div>
            </div>

            <div class="empty" th:if="${tickets == null or tickets.empty}">
                <div class="empty-icon">📭</div>
                <p>No tickets yet — submit your first request!</p>
                <button class="btn-primary" onclick="toggleForm()">+ New Request</button>
            </div>
        </div>
    </div>
</main>

<script>
    function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
    function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
    function toggleForm(){
        const f=document.getElementById('newRequestForm');
        f.classList.toggle('open');
        if(f.classList.contains('open')) f.scrollIntoView({behavior:'smooth'});
    }
    function filterTickets(status, btn){
        document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('#ticketList .tr').forEach(row=>{
            row.style.display = (status==='all' || row.dataset.status===status) ? '' : 'none';
        });
    }
    // Auto-open form if #new in URL
    if(window.location.hash==='#new') toggleForm();
</script>
</body>
</html>
