# =============================================================================
# Grafana — Datasource Auto-Provisioning
# =============================================================================
# Grafana automatically discovers this datasource on startup.
# No manual setup required — Prometheus is ready to use immediately.
# =============================================================================

---
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
