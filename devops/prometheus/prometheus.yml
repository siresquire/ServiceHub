# =============================================================================
# Prometheus — Scrape Configuration
# =============================================================================
# Prometheus scrapes metrics from the Spring Boot Actuator endpoint.
# Used with docker-compose.observability.yml (optional monitoring stack).
#
# Access Prometheus UI: http://localhost:9090
# =============================================================================

global:
  scrape_interval: 15s # How often to scrape targets
  evaluation_interval: 15s # How often to evaluate alerting rules

# ---------------------------------------------------------------------------
# Scrape Targets
# ---------------------------------------------------------------------------
scrape_configs:
  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ServiceHub Backend — Spring Boot Actuator Prometheus endpoint
  - job_name: "servicehub-backend"
    metrics_path: "/actuator/prometheus"
    scrape_interval: 10s
    static_configs:
      - targets: ["backend:8080"]
        labels:
          application: "servicehub"
          environment: "dev"
